<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | EventHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#f3f4f6', secondary: '#7c3aed', secondaryHover: '#6d28d9', accent: '#fbbf24' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
</head>

<body class="bg-primary flex items-center justify-center min-h-screen p-4">

    <!-- Toast -->
    <div id="toast"
        class="fixed top-5 right-5 transform transition-all duration-300 translate-x-[150%] opacity-0 bg-white text-gray-800 px-6 py-4 rounded-xl shadow-xl border-l-4 border-red-500 z-50 flex items-center gap-3 w-80">
        <i data-lucide="alert-circle" id="toast-icon" class="text-red-500"></i>
        <span id="toast-msg" class="font-medium">Error message</span>
    </div>

    <div
        class="w-full max-w-md bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] sm:p-10 p-6 relative overflow-hidden">
        <!-- Decorative bg -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-purple-50 rounded-full blur-3xl"></div>

        <div class="relative z-10">
            <a href="index.html"
                class="inline-block p-2 bg-gray-50 rounded-lg text-gray-500 hover:text-secondary transition mb-4">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>

            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Create Account</h2>
            <p class="text-gray-500 mt-2 mb-8">Join your campus events platform as a Student.</p>

            <form id="signupForm" class="space-y-4">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Full Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input type="text" id="name" required
                            class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-all bg-gray-50 focus:bg-white"
                            placeholder="John Doe">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input type="email" id="email" required
                            class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-all bg-gray-50 focus:bg-white"
                            placeholder="johndoe@university.edu">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input type="password" id="password" required
                            class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-all bg-gray-50 focus:bg-white"
                            placeholder="Create a secure password">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" id="signupBtn"
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm shadow-purple-500/30 text-sm font-semibold text-white bg-secondary hover:bg-secondaryHover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary transition-all transform hover:-translate-y-0.5">
                        Create Account
                    </button>
                </div>
            </form>

            <p class="mt-8 text-center text-sm text-gray-600">
                Already have an account? <a href="login.html"
                    class="font-semibold text-secondary hover:text-secondaryHover">Sign in instead</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
